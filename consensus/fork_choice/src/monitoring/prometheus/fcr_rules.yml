# FCR-specific Prometheus recording rules
# This file contains detailed recording rules for Fast Confirmation Rule metrics

groups:
  - name: fcr_performance
    interval: 15s
    rules:
      # Core confirmation time metrics (now measuring actual delay)
      - record: fcr_confirmation_time_seconds
        expr: |
          histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket)
        labels:
          target_window: "12-24s"
          algorithm: "fcr"
          quantile: "median"

      - record: fcr_confirmation_time_seconds_p95
        expr: |
          histogram_quantile(0.95, fcr_confirmation_time_seconds_bucket)
        labels:
          target_window: "12-24s"
          algorithm: "fcr"
          quantile: "p95"

      - record: fcr_confirmation_time_seconds_p99
        expr: |
          histogram_quantile(0.99, fcr_confirmation_time_seconds_bucket)
        labels:
          target_window: "12-24s"
          algorithm: "fcr"
          quantile: "p99"

      # Slot-based confirmation delay (target: 1-2 slots)
      - record: fcr_slot_confirmation_delay
        expr: |
          histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket) / 12
        labels:
          target_slots: "1-2"
          algorithm: "fcr"

      # Compliance tracking (now measuring actual confirmation delay)
      - record: fcr_time_compliance_ratio
        expr: |
          (
            histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket) >= 12 and 
            histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket) <= 24
          ) or vector(0)
        labels:
          compliance_type: "time_window"
          target: "12-24s"

      - record: fcr_slot_compliance_ratio
        expr: |
          (
            histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket) / 12 >= 1 and 
            histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket) / 12 <= 2
          ) or vector(0)
        labels:
          compliance_type: "slot_window"
          target: "1-2_slots"

      # Performance aggregations (using actual metrics)
      - record: fcr_avg_confirmation_time_5m
        expr: |
          histogram_quantile(0.5, rate(fcr_confirmation_time_seconds_bucket[5m]))
        labels:
          aggregation: "5m_avg"

      - record: fcr_p95_confirmation_time_5m
        expr: |
          histogram_quantile(0.95, rate(fcr_confirmation_time_seconds_bucket[5m]))
        labels:
          aggregation: "5m_p95"

      - record: fcr_p99_confirmation_time_5m
        expr: |
          histogram_quantile(0.99, rate(fcr_confirmation_time_seconds_bucket[5m]))
        labels:
          aggregation: "5m_p99"

      # Success rate metrics (using actual counters)
      - record: fcr_confirmation_success_rate
        expr: |
          rate(fcr_confirmation_time_seconds_count[1m]) * 12  # Convert to per-slot rate
        labels:
          rate_type: "per_slot"

      - record: fcr_confirmation_throughput_per_minute
        expr: |
          rate(fcr_confirmation_time_seconds_count[1m]) * 60
        labels:
          rate_type: "per_minute"

      # Direct queries for 12-24 second target analysis
      - record: fcr_median_confirmation_time
        expr: |
          histogram_quantile(0.5, fcr_confirmation_time_seconds_bucket)
        labels:
          target: "12-24s"

      - record: fcr_avg_confirmation_time
        expr: |
          rate(fcr_confirmation_time_seconds_sum[5m]) / rate(fcr_confirmation_time_seconds_count[5m])
        labels:
          target: "12-24s"

      - record: fcr_confirmation_count_total
        expr: |
          fcr_confirmation_time_seconds_count
        labels:
          metric_type: "counter"

      - record: fcr_confirmation_sum_total
        expr: |
          fcr_confirmation_time_seconds_sum
        labels:
          metric_type: "counter"

      # Outcome distributions by slot-delay
      - record: fcr_confirmations_zero_slot
        expr: |
          sum(fcr_confirmations_by_slots_total{slots="0"})

      - record: fcr_confirmations_one_slot
        expr: |
          sum(fcr_confirmations_by_slots_total{slots="1"})

      - record: fcr_confirmations_two_slot
        expr: |
          sum(fcr_confirmations_by_slots_total{slots="2"})

      - record: fcr_confirmations_ge3_slot
        expr: |
          sum(fcr_confirmations_by_slots_total{slots="ge3"})

      - record: fcr_confirmations_ge1_share
        expr: |
          (sum(fcr_confirmations_by_slots_total{slots!="0"}))
          /
          clamp_min(sum(fcr_confirmations_total), 1)

      - record: fcr_confirmations_1_2_share
        expr: |
          (sum(fcr_confirmations_by_slots_total{slots=~"1|2"}))
          /
          clamp_min(sum(fcr_confirmations_total), 1)

  - name: fcr_alerts
    interval: 30s
    rules:
      # Performance alerts
      - alert: FCRSlowConfirmation
        expr: fcr_avg_confirmation_time_5m > 30
        for: 2m
        labels:
          severity: warning
          component: fcr
          alert_type: "performance"
        annotations:
          summary: "FCR confirmation time exceeds 30 seconds"
          description: "Average FCR confirmation time is {{ $value }}s, target is 12-24s"
          runbook_url: "https://github.com/sigp/lighthouse/wiki/FCR-Troubleshooting"

      - alert: FCRConfirmationTimeout
        expr: fcr_avg_confirmation_time_5m > 60
        for: 1m
        labels:
          severity: critical
          component: fcr
          alert_type: "timeout"
        annotations:
          summary: "FCR confirmation timeout - no confirmations in 60+ seconds"
          description: "FCR has not confirmed blocks for {{ $value }}s"
          runbook_url: "https://github.com/sigp/lighthouse/wiki/FCR-Troubleshooting"

      - alert: FCRLowComplianceRate
        expr: fcr_time_compliance_ratio < 0.8
        for: 5m
        labels:
          severity: warning
          component: fcr
          alert_type: "compliance"
        annotations:
          summary: "FCR compliance rate below 80%"
          description: "Only {{ $value | humanizePercentage }} of confirmations within 12-24s target"

      - alert: FCRSlotDelayHigh
        expr: fcr_slot_confirmation_delay > 3
        for: 2m
        labels:
          severity: warning
          component: fcr
          alert_type: "slot_delay"
        annotations:
          summary: "FCR slot delay exceeds 3 slots"
          description: "Confirmation taking {{ $value }} slots, target is 1-2 slots"

      - alert: FCRHighLatency
        expr: fcr_p95_confirmation_time_5m > 45
        for: 3m
        labels:
          severity: warning
          component: fcr
          alert_type: "latency"
        annotations:
          summary: "FCR 95th percentile confirmation time too high"
          description: "95th percentile confirmation time is {{ $value }}s, target is <45s"

      - alert: FCRNoConfirmations
        expr: fcr_confirmation_success_rate == 0
        for: 1m
        labels:
          severity: critical
          component: fcr
          alert_type: "no_confirmations"
        annotations:
          summary: "FCR not producing any confirmations"
          description: "FCR confirmation rate is 0 for {{ $value }} minutes"
